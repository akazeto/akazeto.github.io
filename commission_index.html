<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/commission_main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav>
    <div class="nav-logo">
      <span class="nav-logo-dot"></span>
      Artist Portfolio
    </div>
    <ul class="nav-links">
        <li><a href="commission_index.html">Main</a></li>
        <li><a href="commission_rq.html" class="active">Commission</a></li>
        <li><a href="#">정보</a></li>
        <li><a href="#">시사</a></li>
    </ul>
  </nav>

  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-image">
        <!-- 이미지를 바꾸고 싶으면 아래 img 태그의 src를 수정하세요 -->
        <img src="assets/css/images/profile.jpg">
        <div class="hero-image-placeholder">프로필 이미지</div>
      </div>

      <div class="hero-info">
        <h1 class="hero-name">하루사마</h1>
        <div class="hero-actions">
            <button class="btn-primary">일러스트 커미션</button>
            <button class="btn-primary">rkgk 커미션</button>
            <button class="btn-primary">자주 묻는 질문</button>
        </div>
        <div class="hero-social">
            <a class="social-icon" href="https://x.com/harusamadayo1" target="_blank" title="X (Twitter)">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            <a class="social-icon" href="https://pixiv.net/users/22052465" target="_blank" title="pixiv" style="color:rgba(69,176,249,0.8)">
                <i class="fa-brands fa-pixiv"></i>
            </a>
            <a class="social-icon" href="https://harusama.fanbox.cc/" target="_blank" title="FANBOX" style="font-size:11px; font-weight:600; width:auto; padding:0 10px; border-radius:8px;">
                FANBOX
            </a>
        </div>
      </div>
    </section>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div>
          <div class="stat-label">누적 거래</div>
          <div class="stat-value">150+</div>
        </div>
        <span class="stat-icon">☆</span>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">시간 내</div>
          <div class="stat-value">99%</div>
        </div>
        <span class="stat-icon">♡</span>
      </div>
    </div>

    <!-- GENRE -->
    <section class="section">
      <div class="section-title">선호 장르</div>
      <div class="genre-list">
        <div class="genre-item">
          <div class="genre-header">
            <span class="genre-name">캐릭터 기기어</span>
            <span class="genre-pct">13%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" data-width="13"></div>
          </div>
        </div>
        <div class="genre-item">
          <div class="genre-header">
            <span class="genre-name">표준 일러스트</span>
            <span class="genre-pct">69%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" data-width="69"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    © 2026 Artist Portfolio · 모든 이미지는 저작권 보호를 받습니다
  </footer>

  <script>
    // 바 애니메이션: 페이지 로드 후 실행
    window.addEventListener('load', () => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        setTimeout(() => {
          bar.style.width = bar.dataset.width + '%';
        }, 400);
      });
    });
  </script>

</body>
</html>
