<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --bg2: #2a2a2a;
      --bg3: #333333;
      --text: #f0f0f0;
      --text-muted: #999;
      --accent: #e040fb;
      --accent2: #f06292;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(30,30,30,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }

    .nav-logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    /* MAIN LAYOUT */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 32px 80px;
    }

    /* HERO */
    .hero {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 52px;
      align-items: center;
      margin-bottom: 64px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-image {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg3);
      position: relative;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* placeholder gradient when no image */
    .hero-image-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .hero-info { animation: fadeUp 0.6s 0.1s ease both; }

    .hero-name {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .hero-title {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: 14px;
      color: #bbb;
      line-height: 1.8;
      margin-bottom: 28px;
      max-width: 400px;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      font-family: inherit;
    }

    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-family: inherit;
    }

    .btn-secondary:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    .hero-social {
      display: flex;
      gap: 16px;
    }

    .social-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
    }

    .social-icon:hover {
      border-color: var(--accent);
      background: rgba(224,64,251,0.08);
      color: var(--accent);
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -1px;
      font-family: 'DM Sans', sans-serif;
    }

    .stat-icon {
      font-size: 22px;
      opacity: 0.5;
    }

    /* GENRE */
    .section {
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .section-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 20px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .genre-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .genre-item {}

    .genre-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .genre-name {
      font-size: 14px;
      color: var(--text);
    }

    .genre-pct {
      font-size: 13px;
      color: var(--text-muted);
    }

    .bar-track {
      height: 4px;
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0;
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <span class="nav-logo-dot"></span>
      Artist Portfolio
    </div>
    <ul class="nav-links">
      <li><a href="#">포트폴리오</a></li>
      <li><a href="#">서비스</a></li>
      <li><a href="#">정보</a></li>
      <li><a href="#">시사</a></li>
    </ul>
  </nav>

  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-image">
        <!-- 이미지를 바꾸고 싶으면 아래 img 태그의 src를 수정하세요 -->
        <!-- <img src="your-photo.jpg" alt="프로필 사진"> -->
        <div class="hero-image-placeholder">프로필 이미지</div>
      </div>

      <div class="hero-info">
        <h1 class="hero-name">김아트</h1>
        <p class="hero-title">프리랜서 일러스트레이터</p>
        <p class="hero-desc">
          감각적이고 자신만의 스타일로 고객 아트를 넘나드는 비주얼스토리텔러.
          캐릭터 일러스트, 타입&amp;배경 아트웍이 전문이며, 클라이언트가 가장 좋아하는
          작업 스타일로 이름을 알려가고 있습니다.
        </p>
        <div class="hero-actions">
          <button class="btn-primary">팔로우</button>
          <button class="btn-secondary">문의하기</button>
        </div>
        <div class="hero-social">
          <a class="social-icon" href="#" title="Instagram">ig</a>
          <a class="social-icon" href="#" title="Behance">be</a>
          <a class="social-icon" href="#" title="Email">@</a>
        </div>
      </div>
    </section>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div>
          <div class="stat-label">누적 거래</div>
          <div class="stat-value">150+</div>
        </div>
        <span class="stat-icon">☆</span>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">시간 내</div>
          <div class="stat-value">99%</div>
        </div>
        <span class="stat-icon">♡</span>
      </div>
    </div>

    <!-- GENRE -->
    <section class="section">
      <div class="section-title">선호 장르</div>
      <div class="genre-list">
        <div class="genre-item">
          <div class="genre-header">
            <span class="genre-name">캐릭터 기기어</span>
            <span class="genre-pct">13%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" data-width="13"></div>
          </div>
        </div>
        <div class="genre-item">
          <div class="genre-header">
            <span class="genre-name">표준 일러스트</span>
            <span class="genre-pct">69%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" data-width="69"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    © 2026 Artist Portfolio · 모든 이미지는 저작권 보호를 받습니다
  </footer>

  <script>
    // 바 애니메이션: 페이지 로드 후 실행
    window.addEventListener('load', () => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        setTimeout(() => {
          bar.style.width = bar.dataset.width + '%';
        }, 400);
      });
    });
  </script>

</body>
</html>
